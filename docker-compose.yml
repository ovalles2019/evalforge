services:
  evalforge:
    build: .
    container_name: evalforge
    ports:
      - "8000:8000"
    environment:
      # Persist run history to the mounted SQLite DB by default.
      EVALFORGE_DATABASE_URL: sqlite:////data/evalforge.db
      EVALFORGE_TARGET: ${EVALFORGE_TARGET:-mock}
      EVALFORGE_JUDGE: ${EVALFORGE_JUDGE:-heuristic}
    volumes:
      - evalforge_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: evalforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - evalforge
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: evalforge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  evalforge_data:
  prometheus_data:
  grafana_data:
