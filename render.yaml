# Render Blueprint — deploys the EvalForge web service (API + dashboard) plus a
# managed Postgres for durable run history.
#
# Deploy: push this repo to GitHub, then open
#   https://dashboard.render.com/blueprint/new?repo=<your repo URL>
# and click "Apply".
#
# Notes (Render free tier):
#   - The web service spins down after 15 min of inactivity (cold starts on wake).
#   - Free Postgres expires ~30 days after creation; upgrade the plan to persist.
services:
  - type: web
    name: evalforge
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install '.[postgres]'"
    startCommand: "evalforge serve --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Target under test + judge. Defaults run fully offline (no API keys).
      # To evaluate a real endpoint, set EVALFORGE_TARGET=openai and the
      # EVALFORGE_TARGET_* vars (and optionally EVALFORGE_JUDGE=llm).
      - key: EVALFORGE_TARGET
        value: mock
      - key: EVALFORGE_JUDGE
        value: heuristic
      # Durable run history in managed Postgres.
      - key: EVALFORGE_DATABASE_URL
        fromDatabase:
          name: evalforge-db
          property: connectionString

databases:
  - name: evalforge-db
    databaseName: evalforge
    plan: free
    region: oregon
